# ─────────────────────────────────────────────────────────────────────────────
# 개발 전용 인프라(Redis만 띄움)
# ─────────────────────────────────────────────────────────────────────────────
# 용도: 로컬 개발에서 Redis만 컨테이너로 띄우고, 앱은 `uv run uvicorn ...`으로
#       호스트에서 직접(핫리로드) 실행한다. 운영 배포는 docker-compose.prod.yml 사용.
#
# DB는 여기에 없음(개발·배포 공통 규칙): PostgreSQL은 **별도 docker로 따로 구성**하고
#   앱은 외부 DB 엔드포인트로 연결한다. .env / .env.example 의 DATABASE_URL 참고
#   (예: postgresql+asyncpg://payment:...@localhost:5432/payment — 별도 payment-postgres 컨테이너).
#   테스트도 외부 DB를 사용한다(tests/conftest.py 의 TEST_DATABASE_URL).
#
# 보안(감사 Phase 2 — M-4): 포트를 루프백(127.0.0.1)에만 바인딩한다.
#   Docker 포트 publish 기본값은 0.0.0.0이라, 외부에서 접근 가능한 호스트에서
#   그대로 띄우면 Redis(어드민 세션)가 인터넷에 노출된다.
# 실행:  docker compose up -d            (개발 Redis 기동)
# ─────────────────────────────────────────────────────────────────────────────

# 프로젝트명 분리 — 개발 인프라는 'payment-dev'로 격리한다.
# (운영 스택 docker-compose.prod.yml은 'payment_system'. 같은 프로젝트명으로 섞이면
#  운영 컨테이너에 개발용 컨테이너가 끼어드는 사고가 난다.)
name: payment-dev

services:
  # ── 개발용 Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"      # 호스트 6380 ↔ 컨테이너 6379, 루프백에만 노출
