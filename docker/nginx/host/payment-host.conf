# ─────────────────────────────────────────────────────────────────────────────
# 호스트(VM)에 설치된 nginx용 사이트 설정 — payment_system 리버스 프록시
# ─────────────────────────────────────────────────────────────────────────────
# 역할: 인터넷 80/443을 받아(아래는 80만; TLS는 certbot --nginx 가 자동 주입) docker app
#       컨테이너(127.0.0.1:8000)로 전달한다. app은 compose에서 127.0.0.1:8000 에만 publish.
#
# 설치(Ubuntu/Debian 기준):
#   sudo cp docker/nginx/host/payment-host.conf /etc/nginx/conf.d/payment.conf
#   # server_name 을 환경에 맞게 수정(prod: api-pay.medisolveai.com / stg: api-stg-pay.medisolveai.com)
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api-pay.medisolveai.com   # ← 443 서버블록·인증서·80→443 리다이렉트 자동 추가
#
# 주의: default.conf 의 기본 server 와 server_name 충돌 시 /etc/nginx/conf.d/default.conf 를 제거하거나
#       이 파일의 server_name 을 명시(아래) 한다. certbot 실행 후에는 이 파일에 443 블록이 추가된다.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    # 환경별 FQDN — prod: api-pay.medisolveai.com / stg: api-stg-pay.medisolveai.com
    server_name api-pay.medisolveai.com;

    # Let's Encrypt webroot 챌린지(certbot --nginx 사용 시 자동 처리되지만, webroot 갱신도 대비).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 업로드 본문 최대(엑셀 다운로드/업로드 등). 필요 시 상향.
    client_max_body_size 16m;

    location / {
        # docker app 컨테이너(루프백에 publish된 8000)로 전달.
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;            # 원 요청 호스트 보존
        proxy_set_header X-Real-IP         $remote_addr;     # 원 클라이언트 IP
        # 클라이언트 IP를 XFF 맨 오른쪽에 append → app 의 TRUST_PROXY_HOPS=1 과 정합(진짜 IP 식별).
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;          # 원 프로토콜(https) 전달
        proxy_set_header Connection        "";               # hop-by-hop 제거 → keepalive 유지
        proxy_read_timeout 90s;   # 토스 자동결제 승인(최대 65s)보다 넉넉히
    }
}

# certbot --nginx 실행 후 아래와 같은 443 server 블록과 80→443 리다이렉트가 이 파일에 자동 추가된다.
# (수동으로 관리하지 않아도 됨. 인증서 경로는 /etc/letsencrypt/live/<도메인>/ 아래로 잡힌다.)
