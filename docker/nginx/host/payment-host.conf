# ─────────────────────────────────────────────────────────────────────────────
# /etc/nginx/conf.d/payment.conf — payment_system 리버스 프록시 (호스트 nginx)
# 인터넷 80/443 ──▶ 호스트 nginx(TLS 종단) ──▶ docker app(127.0.0.1:8000)
# ─────────────────────────────────────────────────────────────────────────────
# 적용(인증서 먼저 → 이 파일 배치 → reload):
#   sudo apt-get install -y nginx certbot python3-certbot-nginx
#   sudo certbot certonly --nginx -d api-stg-pay.medisolveai.com   # 인증서만 발급(아래 ssl_certificate 경로 생성)
#   sudo cp docker/nginx/host/payment-host.conf /etc/nginx/conf.d/payment.conf
#   sudo rm -f /etc/nginx/sites-enabled/default                    # 기본 사이트 충돌 방지
#   sudo nginx -t && sudo systemctl reload nginx
#
#   (대안) 80 블록만 둔 상태에서 `sudo certbot --nginx -d <도메인>` 을 실행하면 443 블록을 자동 생성한다.
#
# prod로 쓸 때: server_name 2곳 + ssl_certificate 2경로를 api-pay.medisolveai.com 으로 교체.
# 주의: 인증서 파일이 없으면 `nginx -t` 가 실패한다 → 반드시 certbot 발급을 먼저.
# ─────────────────────────────────────────────────────────────────────────────

# ── 80: ACME 챌린지 처리 + 나머지는 전부 https로 리다이렉트 ──
server {
    listen 80;
    listen [::]:80;
    server_name api-stg-pay.medisolveai.com;

    # Let's Encrypt webroot 갱신 경로
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 443: 실제 서비스(HTTPS) ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api-stg-pay.medisolveai.com;

    # 인증서(certbot이 발급한 경로) — stg 도메인
    ssl_certificate     /etc/letsencrypt/live/api-stg-pay.medisolveai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-stg-pay.medisolveai.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # 업로드 본문 최대(엑셀 등). 필요 시 상향.
    client_max_body_size 16m;

    # 보안 헤더(앱도 일부 부착하지만 프록시단에서 한 번 더 보강)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8000;     # docker app(루프백 publish)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # 실제 클라이언트 IP를 XFF 맨 오른쪽에 append → app TRUST_PROXY_HOPS=1 과 정합
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 90s;               # 토스 자동결제 승인(최대 65s) 대비
    }
}

# ── 8001: 별도 백엔드 서비스 통과 프록시(외부 8001 → 127.0.0.1:8001) ──
# 같은 VM의 별도 서비스(127.0.0.1:8001 루프백)를 8001 포트 그대로 외부에 노출한다.
# 위 80/443 도메인 프록시와는 독립이며 평문(http)으로 통과시킨다.
# 주의: 8001은 방화벽/보안그룹에서 별도로 인바운드를 열어야 외부 접근이 된다.
server {
    listen 8001;
    listen [::]:8001;
    server_name api-stg-pay.medisolveai.com;

    # 업로드 본문 최대(443 블록과 동일 기준).
    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:8001;     # 별도 백엔드 서비스(루프백 publish)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # 실제 클라이언트 IP를 XFF 맨 오른쪽에 append → 백엔드 TRUST_PROXY_HOPS=1 과 정합
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 90s;               # 장기 요청 대비(443 블록과 동일)
    }
}
