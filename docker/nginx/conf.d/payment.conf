# ─────────────────────────────────────────────────────────────────────────────
# payment_system 리버스 프록시 (TLS 종단)
# ─────────────────────────────────────────────────────────────────────────────
# 역할: 인터넷의 HTTPS 요청을 받아 TLS를 풀고(종단) 내부 app:8000 으로 전달한다.
#       80(평문)은 전부 443(https)으로 리다이렉트한다.
# 인증서: ./docker/nginx/certs/{fullchain.pem,privkey.pem} 로 마운트(README/매뉴얼 1.6 참조).
# ─────────────────────────────────────────────────────────────────────────────

# 백엔드(앱) 풀 정의. app = compose의 컨테이너 이름, 8000 = 앱 포트.
upstream payment_app {
    server app:8000;
    keepalive 32;     # 앱과의 연결 32개를 재사용 → 매 요청 TCP 핸드셰이크 비용 절감
}

# ── HTTP(80): ACME(Let's Encrypt) 챌린지만 처리하고 나머지는 전부 https로 ────────
server {
    listen 80;
    server_name _;    # 모든 호스트명 수용(전용 도메인 없이도 동작)

    # certbot webroot 방식 인증서 발급/갱신 경로(docker/nginx/certbot-www 마운트).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    # 그 외 모든 평문 요청은 같은 경로의 https로 영구 리다이렉트(평문 차단).
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS(443): 실제 서비스 ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;         # HTTP/2 활성화(다중화로 응답 지연 감소)
    server_name _;

    # 마운트된 인증서·개인키. 파일이 없으면 nginx가 기동 실패한다(자주 겪는 오류).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # 구버전 취약 프로토콜·암호 제외, 안전한 조합만 허용.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    # TLS 세션을 캐시해 재접속 시 핸드셰이크를 생략(성능).
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # 업로드 본문 최대 크기(엑셀 업로드/다운로드 등). 더 큰 파일이 필요하면 상향.
    client_max_body_size 16m;

    # 보안 헤더(앱도 일부 부착하지만 프록시단에서 한 번 더 보강).
    add_header X-Content-Type-Options nosniff always;             # MIME 스니핑 차단
    add_header X-Frame-Options DENY always;                       # 클릭재킹(iframe 삽입) 차단
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # HTTPS 강제(HSTS, 1년)

    location / {
        proxy_pass http://payment_app;     # 위 upstream(앱)으로 전달
        proxy_http_version 1.1;            # keepalive 사용을 위해 HTTP/1.1 고정
        proxy_set_header Host              $host;          # 원 요청 호스트 보존
        proxy_set_header X-Real-IP         $remote_addr;   # 원 클라이언트 IP 전달
        # 클라이언트 IP를 XFF 맨 오른쪽에 append → 앱 TRUST_PROXY_HOPS=1 과 정합(진짜 IP 식별)
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;        # 원 프로토콜(https) 전달
        proxy_set_header Connection        "";             # hop-by-hop 헤더 제거 → 업스트림 keepalive 유지
        proxy_read_timeout 90s;   # 응답 대기 한도 — 토스 자동결제 승인(최대 65s)보다 넉넉히
    }
}
