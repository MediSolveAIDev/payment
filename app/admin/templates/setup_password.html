{% extends "base.html" %}
{% block title %}비밀번호 설정{% endblock %}
{% block content %}
<div class="login-wrap card">
  <h1>비밀번호 설정</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/admin/setup-password">
    <input type="hidden" name="token" value="{{ token }}">
    <label for="password">새 비밀번호 (10자 이상)</label>
    <div class="input-eye">
      <input type="password" id="password" name="password" minlength="10" required>
      <button type="button" class="eye-btn" aria-label="비밀번호 표시">&#x1F441;</button>
    </div>
    <label for="password_confirm">비밀번호 확인</label>
    <div class="input-eye">
      <input type="password" id="password_confirm" name="password_confirm" required>
      <button type="button" class="eye-btn" aria-label="비밀번호 표시">&#x1F441;</button>
    </div>
    <div class="actions"><button class="btn btn-primary" type="submit" style="width:100%">설정</button></div>
  </form>
</div>
{% endblock %}
