{# 키 복사 모달 — hx-get으로 body 끝에 붙는 fragment #}
<div class="modal-overlay open" id="keys-modal">
  <div class="modal" role="dialog" aria-modal="true" style="max-width:520px">
    <div class="modal-body" style="text-align:left">
      <div class="modal-title">{{ service.name }} — 서비스 키</div>
      {% if decrypt_error %}
      <p class="muted" style="margin-top:12px;color:#E5396E">키 복호화에 실패했습니다.
        암호화 키 설정을 확인하세요.</p>
      {% elif api_key %}
      <label style="margin-top:14px">API 키</label>
      <div class="kv"><code style="word-break:break-all">{{ api_key }}</code>
        <button type="button" class="btn btn-sm btn-sub" data-copy="{{ api_key }}">복사</button></div>
      <label style="margin-top:10px">HMAC Secret</label>
      <div class="kv"><code style="word-break:break-all">{{ hmac_secret }}</code>
        <button type="button" class="btn btn-sm btn-sub" data-copy="{{ hmac_secret }}">복사</button></div>
      {% else %}
      <p class="muted" style="margin-top:12px">이 서비스는 암호화 저장 이전에 등록되어
        평문 키가 없습니다. 키 재발급 후 복사할 수 있습니다.</p>
      {% endif %}
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost"
              onclick="document.getElementById('keys-modal').remove()">닫기</button>
    </div>
  </div>
</div>
